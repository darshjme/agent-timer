<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent_grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#cc9933;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#cc9933;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#cc9933;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <g stroke="#21262d" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="56" x2="800" y2="56"/>
    <line x1="0" y1="112" x2="800" y2="112"/>
    <line x1="0" y1="168" x2="800" y2="168"/>
    <line x1="200" y1="0" x2="200" y2="280"/>
    <line x1="400" y1="0" x2="400" y2="280"/>
    <line x1="600" y1="0" x2="600" y2="280"/>
  </g>

  <!-- Accent glow bar -->
  <rect x="0" y="270" width="800" height="3" fill="url(#accent_grad)"/>
  <rect x="0" y="0" width="800" height="3" fill="url(#accent_grad)"/>

  <!-- Animation area (right side) -->
  
  <g transform="translate(615, 50)">
    <circle cx="70" cy="80" r="65" fill="#cc9933" fill-opacity="0.08" stroke="#cc9933" stroke-width="2"/>
    <line x1="70" y1="80" x2="70" y2="30" stroke="#cc9933" stroke-width="3" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" values="0 70 80;360 70 80" dur="10s" repeatCount="indefinite"/>
    </line>
    <line x1="70" y1="80" x2="105" y2="80" stroke="#cc9933" stroke-width="2" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" values="0 70 80;360 70 80" dur="60s" repeatCount="indefinite"/>
    </line>
    <circle cx="70" cy="80" r="4" fill="#cc9933"/>
  </g>

  <!-- Left: text content -->
  <!-- Package badge -->
  <rect x="40" y="38" width="110" height="22" rx="11" fill="#cc9933" fill-opacity="0.12" stroke="#cc9933" stroke-width="1" stroke-opacity="0.5"/>
  <text x="95" y="53" fill="#cc9933" font-family="monospace" font-size="11" text-anchor="middle" font-weight="600">darshjme</text>

  <!-- Title -->
  <text x="40" y="110" fill="#f0f6fc" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="38" font-weight="700" letter-spacing="-1">agent-timer</text>

  <!-- Tagline -->
  <text x="40" y="148" fill="#8b949e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15">Execution timing and SLA enforcement for LLM agents. Zero external depen...</text>

  <!-- Divider -->
  <line x1="40" y1="170" x2="460" y2="170" stroke="#cc9933" stroke-width="0.5" stroke-opacity="0.4"/>

  <!-- Pills -->
  
    <rect x="86" y="220" width="144" height="26" rx="13" fill="#cc9933" fill-opacity="0.15" stroke="#cc9933" stroke-width="1"/>
    <text x="158" y="237" fill="#cc9933" font-family="monospace" font-size="11" text-anchor="middle">Scheduled Tasks</text>
    <rect x="242" y="220" width="152" height="26" rx="13" fill="#cc9933" fill-opacity="0.15" stroke="#cc9933" stroke-width="1"/>
    <text x="318" y="237" fill="#cc9933" font-family="monospace" font-size="11" text-anchor="middle">Cron Expressions</text>
    <rect x="406" y="220" width="144" height="26" rx="13" fill="#cc9933" fill-opacity="0.15" stroke="#cc9933" stroke-width="1"/>
    <text x="478" y="237" fill="#cc9933" font-family="monospace" font-size="11" text-anchor="middle">One-Shot Timers</text>
    <rect x="562" y="220" width="152" height="26" rx="13" fill="#cc9933" fill-opacity="0.15" stroke="#cc9933" stroke-width="1"/>
    <text x="638" y="237" fill="#cc9933" font-family="monospace" font-size="11" text-anchor="middle">Drift Correction</text>
</svg>